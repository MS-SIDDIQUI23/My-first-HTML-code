<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDs And Classes in HTML</title>
  </head>
  <body>
    <h3>IDs and classes Tutorial</h3>
    <div id="MainBox" class="RedBg blackBorder">This is Main Box</div>
    <span class="RedBg"></span>
    <!-- Select and press ctrl + / to comment -->
    <!-- Emmet -->
    <!-- If i want class="redbg" in span then i type span.redbg and press enter -->
    <span class="RedBg"></span>
    <!-- if i want id=mainspan in span the i type span#mainspan and press enter -->
    <span id="Mainspan"></span>
    <div class="RedBg blackBorder anotherClass"></div>
    <!-- Emmet takes div tag as defaut -->
    <div class="blackBackground"></div>
    <!-- Creating multiple elements using Emmet -->
    <!-- span.myClass.myClass2.myClass3 + <Tab> -->
    <span class="myClass myClass2 myClass3">First   </span
    ><span class="myClass myClass2 myClass3">Second </span
    ><span class="myClass myClass2 myClass3">Thrid  </span
    ><span class="myClass myClass2 myClass3">Fourth </span>
  </body>
</html>
