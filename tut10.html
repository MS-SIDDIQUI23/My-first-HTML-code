<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ids & Classes in HTML</title>
</head>
<style>
    /* We target class with dot (.) */
    .red-text { color: red; font-weight: bold;}
    /* We target ID with Hash (#) */
    #main-title 
    /* Display inline use karne se h1 text jitni jagah hi lega */
    { display: inline;
     background-color: yellow; border: 2x solid black;}
    
</style>
<body>
    <h1 id="main-title">This my main title </h1>
    <p class="red-text">This  is Red Paragraph</p>
    <p class="red-text">This is 2nd Red Paragraph</p>
    <span class="red-text">This is Red lnline Element</span>
</body>
</html>
