<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <h2>This is HTML forms tutorial</h2>
    <form action="backend.php">
      <div>
      <label for="name"> Name</label>
        <input type="text" name="MyName" id="name" /></div>
      <br />
      <div>
      <label for="Role"> Role</label>
        <input type="text" name="MyRole" id="Role" /></div>
      <br />
      <div>
      <label for="Email"> Email</label>
        <input type="email" name="MyEmail" id="Email" /></div>
      <div>
        <br />
        <label for="Date"> Date</label>
        <input type="date" name="MyDate" id="Date" />
      </div>
      <div>
        <br />
        <label for="Bonus"> Bonus</label>
         <input type="number" name="MyBonus" id="Bonus"/>
      </div>
      <div>
        <br />
        <label for="Eligibility"> Are you Eligible?</label>
        <input type="checkbox" name="MyEligibility" id="Eligibility" checked />
      </div>
      <div>
        <br />
        Gender: Male<input type="radio" name="MyGender" /> Gender: female<input
          type="radio"
          name="MyGender"
        />
        Gender: Others<input type="radio" name="MyGender" />
      </div>
      <div>
        <br />
        Write about yourself: <br />
        <textarea name="MyText"></textarea>
      </div>
      <div>
        <br />
        <label for="Car">Car</label>
        <select name="MyCar" id="Car">
          <option value="Civic">Civic</option>
          <option value="Corolla">Corolla</option>
          <option value="Audi">Audi</option>
          <option value="BMW">BMW</option>
        </select>
      </div>
      <div>
        <br />
        <input type="submit" value="Submit Now" />
      </div>
      <div>
        <br />
        <input type="reset" value="Reset Now" />
      </div>
    </form>
  </body>
</html>
