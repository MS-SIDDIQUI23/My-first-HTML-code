<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block Elements</title>
</head>
<body>
    <div style="border: 2px solid red;"><em>  I'm a Block element </em></div>
    <p style="border: 2px solid blue;"><em>  This is a Paragraph</em></p>
    <p style="border: 2px solid black;"><em>  Paragraph is block element</em></p>
    <span style="border: 2px solid green;"><b>I'm a Inline element,</b></span>
    <span style="border: 2px solid green;"><b>I'm a also Inline element:</b></span>
    <a style="border: 2px solid green;" href="https://google.com" target="_blank">Go to google</a>
</body>
</html>
