<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Height,Width, Borders and Backgrounds</title>
    <style>
      #firstPara {
        font-size: 30px;
        background-color: red;
        border: 5px solid black;
        height: 50px;
        width: 230px;
        border-radius: 15px;
      }
      #secondPara {
        font-size: 30px;
        background-color: rgb(70, 240, 70);
        width: 300px;
        height: 50px;
        border-top: 5px solid red;
        border-bottom: 5px solid green;
        border-left: 5px solid blue;
        border-right: 5px solid black;
        border-top-left-radius: 15px;
        border-top-right-radius: 30px;
        border-bottom-left-radius: 10px;
        border-bottom-right-radius: 20px;
      }
      #thirdPara {
        font-size: 20px;
        width: 190px;
        height: 250px;
        background-image: url('images.jpg');
        background-repeat: no-repeat;
        border: 5px solid red;
        background-size: cover;
        background-position: center center;
      }
    </style>
  </head>
  <body>
    <h3>This is Heading</h3>
    <p id="firstPara">This is paragraph</p>

    <h3>This is second Heading</h3>
    <p id="secondPara">This is second paragraph</p>

    <h3>This is Third Heading</h3>
    <p id="thirdPara">This is third paragraph</p>
  </body>
</html>
