<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Fonts</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      p {
        font-family: cursive;
        font-weight: 400;
        font-size: 20px;
        font-style: italic;
        color: purple;
        background-color: bisque;
        line-height: 1.5;
      }
      h4 {
        font-family: ubuntu, sans-serif;
        font-weight: 900;
        text-align: center;
        font-size: 40px;
        font-style: italic;
        background-color: blue;
      }
      span {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h4>CSS Fonts Tutorial</h4>
    <p>This is tutorial for CSS <span>Fonts</span></p>
  </body>
</html>
