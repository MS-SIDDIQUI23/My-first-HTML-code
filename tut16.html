<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors in CSS</title>
    <style>
        h2{
            color: rgb(173, 143, 87); background-color: #050505;
        }
        #firstPara{
            color: red; background-color: aqua; /*Color by name*/
        }
        #secondPara{
            color: rgb(4, 5, 105); background-color:  rgb(188, 202, 108); /*RGB And RGBA Colors Method*/
        }
        #thirdPara{
            color: #4d0606; background-color: #776599; /*Hex Colors*/
        }
    </style>
</head>
<body>
    <h2>This is a first Box</h2>
    <p id="firstPara">This is a paragraph of First Box</p>
    <h2>This is a Second Box</h2>
    <p id="secondPara">This is a paragraph of Second Box</p>
    <h2>This is a Third Box</h2>
    <p id="thirdPara">This is a paragraph of Third Box</p>
</body>
    </html>
